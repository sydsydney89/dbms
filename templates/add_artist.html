{% extends "base.html" %}
{% block title %}Add Artist{% endblock %}

{% block content %}
<div class="form-card">
    <h2>Add an Artist</h2>
    <form method="POST">
        <label for="name">Artist Name</label>
        <input type="text" id="name" name="name" placeholder="e.g. Taylor Swift" required />

        <label for="genre">Genre</label>
        <input type="text" id="genre" name="genre" placeholder="e.g. Pop" required />

        <button type="submit" class="btn">Add Artist</button>
    </form>
    <a href="{{ url_for('index') }}" class="back-link">&larr; Back to Home</a>
</div>
{% endblock %}
