{% extends "base.html" %}
{% block title %}Purchase Ticket{% endblock %}

{% block content %}
<div class="form-card">
    <h2>Purchase a Ticket</h2>
    <form method="POST">
        <label for="concert_id">Concert</label>
        <select id="concert_id" name="concert_id" required>
            <option value="">-- Select Concert --</option>
            {% for c in concerts %}
            <option value="{{ c['ConcertId'] }}">
                {{ c['ConcertDate'] }} - {{ c['VenueName'] }}, {{ c['City'] }}
            </option>
            {% endfor %}
        </select>

        <label for="customer_id">Customer</label>
        <select id="customer_id" name="customer_id" required>
            <option value="">-- Select Customer --</option>
            {% for cu in customers %}
            <option value="{{ cu['CustomerId'] }}">{{ cu['CustomerName'] }}</option>
            {% endfor %}
        </select>

        <label for="seat">Seat Number</label>
        <input type="text" id="seat" name="seat" placeholder="e.g. A12" required />

        <label for="price">Price ($)</label>
        <input type="number" id="price" name="price" min="0" step="0.01" placeholder="e.g. 150.00" required />

        <button type="submit" class="btn">Purchase Ticket</button>
    </form>
    <a href="{{ url_for('index') }}" class="back-link">&larr; Back to Home</a>
</div>
{% endblock %}
